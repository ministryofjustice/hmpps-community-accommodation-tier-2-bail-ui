name: Security veracode policy scan

on:
  workflow_dispatch:
  schedule:
    - cron: "34 6 * * 1" # Every Monday

jobs:
  security-veracode-policy-check:
    name: Project security veracode policy scan
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_veracode_policy_scan.yml@24d1df5c3dce9e4e26fa204dc9149aee0772c2e9 # v2.14.9
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit
